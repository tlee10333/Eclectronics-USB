CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_MAIN_STACK_SIZE=12288
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# USB host + USB/IP
CONFIG_USB_HOST_STACK=y
CONFIG_USBIP=y
CONFIG_USBIP_BUF_POOL_SIZE=65536
CONFIG_USBIP_DEVICES_COUNT=2
CONFIG_USBIP_LOG_LEVEL_DBG=y
CONFIG_USBH_LOG_LEVEL_DBG=y
CONFIG_UHC_DRIVER_LOG_LEVEL_DBG=y

CONFIG_UHC_DRIVER=y
CONFIG_UHC_RP2350_PIO_USB=n
CONFIG_UHC_RP2_NATIVE_USB=y
CONFIG_UHC_RP2_NATIVE_USB_LOG_LEVEL_DBG=y

# UART debug console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_LOG=y
CONFIG_NET_MAX_CONN=16

CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=16

CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONFIG_AUTO_INIT=n

# Wi-Fi (nRF7002 shield)
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y

CONFIG_WIFI_NRF70=y
CONFIG_NRF70_SYSTEM_MODE=y

CONFIG_NRF70_STA_MODE=y
CONFIG_NRF70_ENABLE_DUAL_VIF=y

CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_L2_ETHERNET=y

CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# Runtime corruption detection
CONFIG_ASSERT=y
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y
# CONFIG_THREAD_STACK_INFO=y
# CONFIG_THREAD_NAME=y
# CONFIG_THREAD_ANALYZER=y

# Application Kconfig
CONFIG_PICO_USBIP_AP_SSID="USB link"
CONFIG_PICO_USBIP_AP_PSK="usbip12345"
